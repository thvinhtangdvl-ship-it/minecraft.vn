<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Minecraft.vn - My World</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            color: #55FF55; /* Màu xanh lá của Minecraft */
            text-shadow: 2px 2px #000;
            font-size: 3em;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #3e3e3e;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
        }
        .btn {
            background-color: #555;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border: 2px solid #fff;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 MINECRAFT.VN</h1>
        <p>Chào mừng bạn đến với dự án của tui trên GitHub!</p>
        <img src="https://minecraft.net" width="400">
        <br>
        <a href="#" class="btn">Chơi ngay (Sắp ra mắt)</a>
    </div>
</body>
</html>
